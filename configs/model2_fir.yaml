# Model 2: Spatio-Temporal FIR Filter
data:
  source: synthetic
  n_subjects: 20
  n_samples: 153600
  fs: 256.0
  snr_db: 10.0
  window_size: 256
  stride: 128
  processed_path: data/processed/data.h5

model:
  type: fir_filter
  params:
    C_in: 21
    C_out: 4
    filter_length: 17   # ~66ms at 256 Hz (shorter for spatial-dominant problem)
    mode: acausal        # symmetric padding for offline use

training:
  epochs: 200
  batch_size: 64
  optimizer:
    type: adam
    lr: 5.0e-4
    weight_decay: 1.0e-5
  grad_clip: 1.0
  init_from_closed_form: true

loss:
  type: mse

logging:
  log_dir: results/logs
  ckpt_dir: results/checkpoints
  output_dir: results
