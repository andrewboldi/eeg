# Model 3: Convolutional Encoder (Nonlinear)
data:
  source: synthetic
  n_subjects: 20
  n_samples: 153600
  fs: 256.0
  snr_db: 10.0
  window_size: 256
  stride: 128
  processed_path: data/processed/data.h5

model:
  type: conv_encoder
  params:
    C_in: 21
    C_out: 4
    H: 64            # hidden dimension
    K: 17            # temporal kernel size
    N_blocks: 4      # number of temporal blocks
    dropout: 0.1

training:
  epochs: 500
  batch_size: 64
  optimizer:
    type: adamw
    lr: 1.0e-3
    weight_decay: 1.0e-3
  scheduler:
    type: cosine
    T_max: 500
  grad_clip: 1.0

loss:
  type: mse

logging:
  log_dir: results/logs
  ckpt_dir: results/checkpoints
  output_dir: results
